---
- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Set customer attribute."
  ansible.builtin.set_fact:
    checkmk_var_customer: "{{ 'provider' if outer_item.edition in ['managed', 'ultimatemt'] else None }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Verify Checkmk version."
  ansible.builtin.assert:
    that: "outer_item.version in __checkmk_var_result_version"
    fail_msg: "Expected version {{ outer_item.version }}.{{ outer_item.edition }}, but got {{ __checkmk_var_result_version }}!"
    success_msg: "Expected version {{ outer_item.version }}.{{ outer_item.edition }} and found {{ __checkmk_var_result_version }}."
  vars:
    __checkmk_var_result_version: "{{ lookup('checkmk.general.version',
                    server_url=checkmk_var_server_url,
                    site=outer_item.site,
                    validate_certs=False,
                    api_user=checkmk_var_api_user,
                    api_secret=checkmk_var_api_secret)
              }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Use variables from inventory."
  block:

    - name: "{{ outer_item.version }}.{{ outer_item.edition }} - Test plugin with variables from inventory."
      ansible.builtin.assert:
        that: "outer_item.version in __checkmk_var_result_internal"
        fail_msg: "Expected version {{ outer_item.version }}.{{ outer_item.edition }}, but got {{ __checkmk_var_result_internal }}!"
        success_msg: "Expected version {{ outer_item.version }}.{{ outer_item.edition }} and found {{ __checkmk_var_result_internal }}."
      vars:
        __checkmk_var_result_internal: "{{ lookup('checkmk.general.version') }}"
