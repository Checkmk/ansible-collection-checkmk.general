---
checkmk_var_test_sites:
  - version: "{{ checkmk_var_version | default('2.4.0p23') }}"
    edition: "{{ checkmk_var_edition | default('cre') }}"
    site: "testsite"
    remote_sites:
      - site_id: "testsite_r_1"
        site_config:
          status_connection:
            connection:
              socket_type: "tcp"
              port: 6557
              encrypted: true
              host: "localhost"
              verify: false
            proxy:
              use_livestatus_daemon: "with_proxy"
              global_settings: false
              tcp:
                port: 4115
                only_from: []
                tls: true
              params:
                channels: 6
                heartbeat:
                  interval: 10
                  timeout: 4
                channel_timeout: 6
                query_timeout: 240
                connect_retry: 5
                cache: true
            connect_timeout: 2
            status_host:
              status_host_set: "disabled"
            url_prefix: "/testsite_r_1/"
          configuration_connection:
            enable_replication: true
            url_of_remote_site: "http://testsite-r-1:5000/testsite_r_1/check_mk/"
            disable_remote_configuration: true
            ignore_tls_errors: false
            direct_login_to_web_gui_allowed: false
            replicate_event_console: true
            replicate_extensions: false
            message_broker_port: "{{ (checkmk_var_version | default('2.4.0p22') | regex_replace('p.*', '') is version('2.4', '>=')) | ternary(5671, omit) }}"
          basic_settings:
            site_id: "testsite_r_1"
            alias: "remote test site 1"
            customer: "{{ ('managed' in checkmk_var_edition) | ternary('provider', None) }}"
        authentication:
          username: "{{ checkmk_var_api_user }}"
          password: "{{ checkmk_var_api_secret }}"
