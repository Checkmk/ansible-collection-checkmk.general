---
- name: "Include Global Variables."
  ansible.builtin.include_vars: "{{ lookup('ansible.builtin.first_found', checkmk_var_params) }}"
  vars:
    checkmk_var_params:
      files:
        - global.yml
      paths:
        - /home/runner/work/ansible-collection-checkmk.general/ansible-collection-checkmk.general/ansible_collections/checkmk/general/tests/integration/files/includes/vars/
        - /root/ansible_collections/checkmk/general/tests/integration/files/includes/vars/
        - tests/integration/files/includes/vars/

- name: "Print Identifier."
  ansible.builtin.debug:
    msg: "{{ ansible_facts['system_vendor'] }} {{ ansible_facts['product_name'] }} running {{ ansible_facts['virtualization_type'] }}"

- name: "Run preparations."
  ansible.builtin.include_tasks: "{{ lookup('ansible.builtin.first_found', checkmk_var_params) }}"
  vars:
    checkmk_var_params:
      files:
        - prep.yml
      paths:
        - /home/runner/work/ansible-collection-checkmk.general/ansible-collection-checkmk.general/ansible_collections/checkmk/general/tests/integration/files/includes/tasks/
        - /root/ansible_collections/checkmk/general/tests/integration/files/includes/tasks/
        - tests/integration/files/includes/tasks/
  when: |
    (ansible_facts['system_vendor'] == "Dell Inc." and 'Latitude' in ansible_facts['product_name'] and ansible_facts['virtualization_type'] == "container")
    or (ansible_facts['system_vendor'] == "QEMU" and 'Ubuntu' in ansible_facts['product_name'] and ansible_facts['virtualization_type'] == "container")

- name: "Inject a Key into the Sites (Version determined inside container)" # noqa no-changed-when
  ansible.builtin.shell: |
    set -e
    set -o pipefail

    process_containers() {
        RUNTIME=$1
        if command -v "$RUNTIME" &> /dev/null; then
            for container in $("$RUNTIME" ps -q); do
                SITES=$("$RUNTIME" exec "$container" ls /omd/sites/ 2>/dev/null || true)

                for site in $SITES; do
                    RAW_VERSION=$("$RUNTIME" exec "$container" omd version "$site" 2>/dev/null || true)

                    if [ -n "$RAW_VERSION" ]; then
                        VERSION_STR=$(echo "$RAW_VERSION" | sed -E 's/^([0-9]+\.[0-9]+)\..*/\1.0/')

                        SOURCE="targets/bakery/files/agent_signature_keys-${VERSION_STR}.mk"
                        DEST="/omd/sites/$site/etc/check_mk/multisite.d/wato/agent_signature_keys.mk"

                        if [ -f "$SOURCE" ]; then
                            "$RUNTIME" cp "$SOURCE" "$container:$DEST"
                        fi
                    fi
                done
            done
        fi
    }

    process_containers "docker"
    process_containers "podman"
  args:
    executable: /bin/bash
    # Ensure this matches the relative path to your 'targets' folder from the playbook
    # chdir: "{{ playbook_dir }}"
  when: |
    not (ansible_facts['system_vendor'] == "Dell Inc." and 'Latitude' in ansible_facts['product_name'] and ansible_facts['virtualization_type'] == "container")
    and not (ansible_facts['system_vendor'] == "QEMU" and 'Ubuntu' in ansible_facts['product_name'] and ansible_facts['virtualization_type'] == "container")

- name: "Inject a Key into the Sites when running inside of the Container."
  ansible.builtin.copy:
    src: "{{ lookup('ansible.builtin.first_found', checkmk_var_params) }}"
    dest: /omd/sites/{{ outer_item.site }}/etc/check_mk/multisite.d/wato/agent_signature_keys.mk
    owner: "{{ outer_item.site }}"
    group: "{{ outer_item.site }}"
    mode: "0644"
  vars:
    checkmk_var_params:
      files:
        - agent_signature_keys-{{ outer_item.version | regex_search('^[0-9]+[.][0-9]+[.][0-9]+') }}.mk
      paths:
        - /home/runner/work/ansible-collection-checkmk.general/ansible-collection-checkmk.general/ansible_collections/checkmk/general/tests/integration/targets/bakery/files/
        - /root/ansible_collections/checkmk/general/tests/integration/targets/bakery/files/
        - tests/integration/targets/bakery/files/
  loop: "{{ checkmk_var_test_sites }}"
  loop_control:
    loop_var: outer_item
  when: |
    (ansible_facts['system_vendor'] == "Dell Inc." and 'Latitude' in ansible_facts['product_name'] and ansible_facts['virtualization_type'] == "container")
    or (ansible_facts['system_vendor'] == "QEMU" and 'Ubuntu' in ansible_facts['product_name'] and ansible_facts['virtualization_type'] == "container")

- name: "Testing."
  ansible.builtin.include_tasks: test.yml
  loop: "{{ checkmk_var_test_sites }}"
  loop_control:
    loop_var: outer_item
