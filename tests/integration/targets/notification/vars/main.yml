---
checkmk_var_test_sites:
  - version: "{{ checkmk_var_version }}"
    edition: "{{ checkmk_var_edition | default('cre') }}"
    site: "testsite"

checkmk_var_notification_config:
  rule_properties:
    description: "Test notification rule"
    comment: "Created by Ansible integration test"
  notification_method:
    notify_plugin:
      option: "create_notification_with_the_following_parameters"
      plugin_params:
        plugin_name: "mail"
    notification_bulking:
      state: "disabled"
  contact_selection:
    all_contacts_of_the_notified_object:
      state: "enabled"

checkmk_var_notification_config_updated:
  rule_properties:
    description: "Updated test notification rule"
    comment: "Updated by Ansible integration test"
  notification_method:
    notify_plugin:
      option: "create_notification_with_the_following_parameters"
      plugin_params:
        plugin_name: "mail"
    notification_bulking:
      state: "disabled"
  contact_selection:
    all_contacts_of_the_notified_object:
      state: "enabled"

checkmk_var_notification_config_minimal:
  rule_properties:
    description: "Test minimal notification rule"
    comment: "Created with minimal config"
  notification_method:
    notify_plugin:
      option: "create_notification_with_the_following_parameters"
      plugin_params:
        plugin_name: "mail"
