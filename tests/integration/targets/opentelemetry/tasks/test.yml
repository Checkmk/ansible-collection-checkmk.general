  register: __checkmk_var_result_prom_delete
  # Same restart-induced reset risk as the create above.
  until: __checkmk_var_result_prom_delete.http_code != -1
  retries: 10
  delay: 3
  failed_when: not __checkmk_var_result_prom_delete.changed

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Activate."
  activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
