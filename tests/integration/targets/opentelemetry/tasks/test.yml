    config_id: "{{ outer_item.prom_scrape.id }}"
    config:
      title: "{{ outer_item.prom_scrape.title_updated }}"
      disabled: false
      sites:
        - "{{ outer_item.site }}"
      prometheus_scrape_configs: "{{ outer_item.prom_scrape.configs_updated }}"
    state: "present"
  register: __checkmk_var_result_prom_update
  # Same restart-induced reset risk as the create above.
  until: __checkmk_var_result_prom_update.http_code != -1
  retries: 10
  delay: 3
  failed_when: not __checkmk_var_result_prom_update.changed

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Activate."
  activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    force_foreign_changes: true
    sites:
