---
# ---------------------------------------------------------------------------
# Collector activation (read endpoint enables idempotency)
# ---------------------------------------------------------------------------

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Enable the OTel collector."
  opentelemetry:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    config_type: "activation"
    site_id: "{{ outer_item.site }}"
    state: "enabled"
  register: __checkmk_var_result_otel_enable
  # The site's apache may still be settling right after container start;
  # retry while the API socket is being reset.
  until: __checkmk_var_result_otel_enable.http_code != -1
  retries: 10
  delay: 3
  failed_when: not __checkmk_var_result_otel_enable.changed

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Enable the OTel collector again (idempotency)."
  opentelemetry:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    config_type: "activation"
    site_id: "{{ outer_item.site }}"
    state: "enabled"
  register: __checkmk_var_result_otel_reenable_idem
  # Same restart-induced reset risk as the initial enable above.
  until: __checkmk_var_result_otel_reenable_idem.http_code != -1
  retries: 10
  delay: 3
  failed_when: __checkmk_var_result_otel_reenable_idem.changed

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Activate."
  activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    force_foreign_changes: true
    sites:
      - "{{ outer_item.site }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Disable the OTel collector."
  opentelemetry:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    config_type: "activation"
    site_id: "{{ outer_item.site }}"
    state: "disabled"
  register: __checkmk_var_result_otel_disable
  # Toggling the collector triggers an apache reload via activation; retry
  # while the API socket is still being reset by the restart.
  until: __checkmk_var_result_otel_disable.http_code != -1
  retries: 10
  delay: 3
  failed_when: not __checkmk_var_result_otel_disable.changed

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Activate."
  activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    force_foreign_changes: true
    sites:
      - "{{ outer_item.site }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Re-enable the OTel collector for subsequent tests."
  opentelemetry:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    config_type: "activation"
    site_id: "{{ outer_item.site }}"
    state: "enabled"
  register: __checkmk_var_result_otel_reenable
  # Same restart-induced reset risk as the disable above.
  until: __checkmk_var_result_otel_reenable.http_code != -1
  retries: 10
  delay: 3

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Activate."
  activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    force_foreign_changes: true
    sites:
      - "{{ outer_item.site }}"

# ---------------------------------------------------------------------------
# Prometheus scrape configuration (full CRUD with idempotency)
# ---------------------------------------------------------------------------

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Create a prom_scrape config."
  opentelemetry:
    server_url: "{{ checkmk_var_server_url }}"
