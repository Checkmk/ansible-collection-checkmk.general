    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    config_type: "prom_scrape"
    config_id: "{{ outer_item.prom_scrape.id }}"
    config:
      title: "{{ outer_item.prom_scrape.title }}"
      disabled: false
      sites:
        - "{{ outer_item.site }}"
      comment: "{{ outer_item.prom_scrape.comment }}"
      prometheus_scrape_configs: "{{ outer_item.prom_scrape.configs }}"
