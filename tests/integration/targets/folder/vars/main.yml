---
checkmk_var_test_sites:
  - version: "{{ checkmk_var_version | default('2.4.0p23') }}"
    edition: "{{ checkmk_var_edition | default('cre') }}"
    site: "testsite"

checkmk_var_folders:
  - path: /test
    name: Test
  - path: /foo
    name: Foo
  - path: /bar
    name: Bar
  - path: /foo/bar
    name: Bar
  - path: /bar/foo
    name: Foo
  - path: /foo/bar/treasure
    name: Treasure
  - path: /foo/bar1
    name: Digital

checkmk_var_folder_attr_test:
  path: /test
  name: Test
  attributes:
    tag_criticality: "test"
    tag_networking: "dmz"

checkmk_var_folders_defaults_test:
  - path: /foo
    verify_name: "foo"
  - path: /bar
    name: Bar
    verify_name: "Bar"
