---
- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Set customer attribute."
  ansible.builtin.set_fact:
    checkmk_var_customer: "{{ 'provider' if outer_item.edition in ['managed', 'ultimatemt'] else None }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Activate without changes."
  activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Create hosts."
  host:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    name: "{{ item.name }}"
    folder: "{{ item.folder }}"
    attributes:
      site: "{{ outer_item.site }}"
      ipaddress: 127.0.0.1
    state: "present"
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Activate without explicit site."
  activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Delete hosts."
  host:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    name: "{{ item.name }}"
    folder: "{{ item.folder }}"
    state: "absent"
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Activate forcing foreign changes."
  activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    force_foreign_changes: true

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Create hosts."
  host:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    name: "{{ item.name }}"
    folder: "{{ item.folder }}"
    attributes:
      site: "{{ outer_item.site }}"
      ipaddress: 127.0.0.1
    state: "present"
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Activate with explicit site."
  activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    force_foreign_changes: 'false'
    sites:
      - "{{ outer_item.site }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Delete hosts."
  host:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    name: "{{ item.name }}"
    folder: "{{ item.folder }}"
    state: "absent"
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Activate with explicit site and redirect."
  activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    redirect: true
    force_foreign_changes: 'false'
    sites:
      - "{{ outer_item.site }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Run Module using Environment Variables."
  activation:
  environment: "{{ __checkmk_var_testing_environment }}"
