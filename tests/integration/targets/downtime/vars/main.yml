---
checkmk_var_test_sites:
  - version: "{{ checkmk_var_version }}"
    edition: "{{ checkmk_var_edition }}"
    site: "testsite"

checkmk_var_hosts:
  - name: test1.tld
    folder: "/"
  - name: test2.tld
    folder: "/"
  - name: test3.tld
    folder: "/"
  - name: test4.tld
    folder: "/"
  - name: test5.tld
    folder: "/"

# Absolute times used for the idempotency assertions. They are kept in the far
# future so re-runs always compare against the very same, unambiguous instants.
checkmk_var_dt_start: "2035-03-25T20:00:00Z"
checkmk_var_dt_end: "2035-03-26T20:00:00Z"
# A shorter end time, used to prove that an existing downtime gets modified
# (the core of issue #672) instead of being left untouched.
checkmk_var_dt_end_short: "2035-03-25T22:00:00Z"

# A Livestatus query matching all of the test hosts above. Because it filters on
# 'host_name' (a column present in both the hosts table and the downtimes table)
# it round-trips cleanly for create-by-query idempotency.
checkmk_var_dt_query: '{"op": "~", "left": "host_name", "right": "^test[0-9]"}'

# Downtimes are scheduled through the monitoring core's external command
# interface, which the core processes asynchronously. After a create/modify/
# delete the change is therefore not instantly visible in the downtimes table,
# so the tests wait this many seconds before re-reading state for an idempotency
# check. Raise it if the CI core is slow.
checkmk_var_dt_settle: 5
