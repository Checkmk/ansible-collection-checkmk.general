# -----------------------------------------------------------------------------
# F. Error handling: cannot create from an unknown downtime_id
# -----------------------------------------------------------------------------

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Present with an unknown downtime_id must fail."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    downtime_id: "999999999"
    site_id: "{{ outer_item.site }}"
    end_time: "{{ checkmk_var_dt_end }}"
  register: __checkmk_var_dt_badid
  failed_when: false

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the unknown-ID update failed cleanly."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_badid.failed | bool"
    fail_msg: "Updating a non-existent downtime by ID should fail, but it did not."
    success_msg: "Updating a non-existent downtime by ID failed as expected."

# -----------------------------------------------------------------------------
# Teardown
# -----------------------------------------------------------------------------

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Remove any remaining host downtimes."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    state: absent
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Delete hosts."
  checkmk.general.host:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    name: "{{ item.name }}"
    folder: "{{ item.folder }}"
    state: "absent"
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Run activation."
  checkmk.general.activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    force_foreign_changes: true

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Run module using environment variables."
  checkmk.general.downtime:
    host_name: "test1.tld"
    comment: "Env-based window"
    state: absent
  environment: "{{ __checkmk_var_testing_environment }}"
