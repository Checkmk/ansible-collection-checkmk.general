# -----------------------------------------------------------------------------
# E. Create / delete by query (service_by_query)
# -----------------------------------------------------------------------------

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Create service downtimes by query."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    query: '{"op": "and", "expr": [{"op": "~", "left": "host_name", "right": "^test[0-9]"}, {"op": "=", "left": "description", "right": "Check_MK"}]}'
    downtime_type: "service"
    comment: "Query service window"
    start_time: "{{ checkmk_var_dt_start }}"
    end_time: "{{ checkmk_var_dt_end }}"
  register: __checkmk_var_dt_qsvc_create

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the service query create changed the state."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_qsvc_create.changed | bool"
    fail_msg: "Creating service downtimes by query reported no change."
    success_msg: "Service downtimes were created by query."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Delete service downtimes by query."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    query: '{"op": "and", "expr": [{"op": "~", "left": "host_name", "right": "^test[0-9]"}, {"op": "=", "left": "service_description", "right": "Check_MK"}]}'
    downtime_type: "service"
    state: absent
  register: __checkmk_var_dt_qsvc_delete

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the service query delete changed the state."
  ansible.builtin.assert:
