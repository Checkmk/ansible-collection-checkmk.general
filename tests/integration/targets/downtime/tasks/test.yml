---
# =============================================================================
# Downtime module integration tests
# =============================================================================
# Beyond simply running the module, these tests assert the `changed` flag so
# that idempotency and the modify-in-place behaviour (issue #672) are actually
# verified rather than merely exercised.
# =============================================================================

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Set customer attribute."
  ansible.builtin.set_fact:
    checkmk_var_customer: "{{ 'provider' if outer_item.edition in ['managed', 'ultimatemt'] else None }}"

# -----------------------------------------------------------------------------
# Setup: hosts, discovery, activation
# -----------------------------------------------------------------------------

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Create hosts."
  checkmk.general.host:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    name: "{{ item.name }}"
    folder: "{{ item.folder }}"
    attributes:
      site: "{{ outer_item.site }}"
      ipaddress: 127.0.0.1
    state: "present"
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Discover hosts."
  checkmk.general.discovery:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    state: "fix_all"
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Run activation."
  checkmk.general.activation:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    force_foreign_changes: true
    redirect: true

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Wait for the activation to finish."
  ansible.builtin.wait_for:
    timeout: 60

# -----------------------------------------------------------------------------
# A. Host downtimes: create, idempotency and modify-in-place (#672)
# -----------------------------------------------------------------------------

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Create host downtime (absolute)."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Patch window"
    start_time: "{{ checkmk_var_dt_start }}"
    end_time: "{{ checkmk_var_dt_end }}"
  register: __checkmk_var_dt_create
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the host downtime was created."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_create.results | map(attribute='changed') | unique | list == [true]"
    fail_msg: "Creating the host downtime did not report a change."
    success_msg: "The host downtime was created."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Create the same host downtime again."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Patch window"
    start_time: "{{ checkmk_var_dt_start }}"
    end_time: "{{ checkmk_var_dt_end }}"
  register: __checkmk_var_dt_create_again
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the second run is idempotent."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_create_again.results | map(attribute='changed') | unique | list == [false]"
    fail_msg: "Re-creating an identical host downtime reported a change."
    success_msg: "Re-creating an identical host downtime was idempotent."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Shorten the host downtime (issue #672)."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Patch window"
    start_time: "{{ checkmk_var_dt_start }}"
    end_time: "{{ checkmk_var_dt_end_short }}"
  register: __checkmk_var_dt_shorten
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the host downtime was modified."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_shorten.results | map(attribute='changed') | unique | list == [true]"
    fail_msg: "Shortening the end time did not report a change (issue #672 not solved)."
    success_msg: "The host downtime was shortened in place."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Shorten again (should be idempotent)."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Patch window"
    start_time: "{{ checkmk_var_dt_start }}"
    end_time: "{{ checkmk_var_dt_end_short }}"
  register: __checkmk_var_dt_shorten_again
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the modified state is idempotent."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_shorten_again.results | map(attribute='changed') | unique | list == [false]"
    fail_msg: "Re-applying the shortened end time reported a change."
    success_msg: "The shortened host downtime is idempotent."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Force a second host downtime."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Patch window"
    start_time: "{{ checkmk_var_dt_start }}"
    end_time: "{{ checkmk_var_dt_end_short }}"
    force: true
  register: __checkmk_var_dt_force
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert force created a new downtime."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_force.results | map(attribute='changed') | unique | list == [true]"
    fail_msg: "force=true did not create an additional downtime."
    success_msg: "force=true created an additional downtime."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Remove host downtimes with comment."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Patch window"
    state: absent
  register: __checkmk_var_dt_del_host
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert host downtimes were removed."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_del_host.results | map(attribute='changed') | unique | list == [true]"
    fail_msg: "Deleting the host downtimes reported no change."
    success_msg: "The host downtimes were removed."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Remove host downtimes again (idempotent)."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Patch window"
    state: absent
  register: __checkmk_var_dt_del_host_again
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the delete is idempotent."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_del_host_again.results | map(attribute='changed') | unique | list == [false]"
    fail_msg: "Deleting already-absent host downtimes reported a change."
    success_msg: "Deleting already-absent host downtimes was idempotent."

# -----------------------------------------------------------------------------
# B. Service downtimes: create, add a service, idempotency, delete
# -----------------------------------------------------------------------------

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Create service downtimes."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Service window"
    start_time: "{{ checkmk_var_dt_start }}"
    end_time: "{{ checkmk_var_dt_end }}"
    service_descriptions:
      - "Check_MK"
      - "Check_MK Discovery"
  register: __checkmk_var_dt_svc
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert service downtimes were created."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_svc.results | map(attribute='changed') | unique | list == [true]"
    fail_msg: "Creating the service downtimes reported no change."
    success_msg: "The service downtimes were created."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Re-create the same service downtimes."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Service window"
    start_time: "{{ checkmk_var_dt_start }}"
    end_time: "{{ checkmk_var_dt_end }}"
    service_descriptions:
      - "Check_MK"
      - "Check_MK Discovery"
  register: __checkmk_var_dt_svc_again
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert service creation is idempotent."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_svc_again.results | map(attribute='changed') | unique | list == [false]"
    fail_msg: "Re-creating identical service downtimes reported a change."
    success_msg: "Re-creating identical service downtimes was idempotent."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Add one more service to the window."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Service window"
    start_time: "{{ checkmk_var_dt_start }}"
    end_time: "{{ checkmk_var_dt_end }}"
    service_descriptions:
      - "Check_MK"
      - "Check_MK Discovery"
      - "CPU load"
  register: __checkmk_var_dt_svc_add
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert only the missing service was added."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_svc_add.results | map(attribute='changed') | unique | list == [true]"
    fail_msg: "Adding a new service to an existing window reported no change."
    success_msg: "The additional service downtime was created."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Delete service downtimes with comment."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "{{ item.name }}"
    comment: "Service window"
    service_descriptions:
      - "Check_MK"
      - "Check_MK Discovery"
      - "CPU load"
    state: absent
  register: __checkmk_var_dt_svc_del
  loop: "{{ checkmk_var_hosts }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert service downtimes were removed."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_svc_del.results | map(attribute='changed') | unique | list == [true]"
    fail_msg: "Deleting the service downtimes reported no change."
    success_msg: "The service downtimes were removed."

# -----------------------------------------------------------------------------
# C. Update by downtime_id (identification and site resolved via the lookup)
# -----------------------------------------------------------------------------

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Create a host downtime to update by ID."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    host_name: "test1.tld"
    comment: "By-ID window"
    start_time: "{{ checkmk_var_dt_start }}"
    end_time: "{{ checkmk_var_dt_end }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Look up the downtime to obtain its ID."
  ansible.builtin.set_fact:
    __checkmk_var_dt_byid: "{{ (lookup('checkmk.general.downtimes',
                            host_name='test1.tld',
                            server_url=checkmk_var_server_url,
                            site=outer_item.site,
                            validate_certs=False,
                            api_user=checkmk_var_api_user,
                            api_secret=checkmk_var_api_secret)
                          | selectattr('extensions.comment', 'equalto', 'By-ID window')
                          | first) }}"

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Update that downtime by its ID."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    downtime_id: "{{ __checkmk_var_dt_byid.id }}"
    site_id: "{{ __checkmk_var_dt_byid.extensions.site_id }}"
    end_time: "{{ checkmk_var_dt_end_short }}"
    comment: "By-ID window reduced"
  register: __checkmk_var_dt_byid_upd

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the by-ID update changed the downtime."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_byid_upd.changed | bool"
    fail_msg: "Updating the downtime by ID reported no change."
    success_msg: "The downtime was updated by ID."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Update by ID again (idempotent)."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    downtime_id: "{{ __checkmk_var_dt_byid.id }}"
    site_id: "{{ __checkmk_var_dt_byid.extensions.site_id }}"
    end_time: "{{ checkmk_var_dt_end_short }}"
    comment: "By-ID window reduced"
  register: __checkmk_var_dt_byid_upd_again

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the by-ID update is idempotent."
  ansible.builtin.assert:
    that: "not (__checkmk_var_dt_byid_upd_again.changed | bool)"
    fail_msg: "Re-applying the same by-ID update reported a change."
    success_msg: "The by-ID update is idempotent."

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Delete the by-ID downtime again by ID."
  checkmk.general.downtime:
    server_url: "{{ checkmk_var_server_url }}"
    site: "{{ outer_item.site }}"
    api_user: "{{ checkmk_var_api_user }}"
    api_secret: "{{ checkmk_var_api_secret }}"
    downtime_id: "{{ __checkmk_var_dt_byid.id }}"
    site_id: "{{ __checkmk_var_dt_byid.extensions.site_id }}"
    state: absent
  register: __checkmk_var_dt_byid_del

- name: "{{ outer_item.version }}.{{ outer_item.edition }} - Assert the by-ID delete changed the state."
  ansible.builtin.assert:
    that: "__checkmk_var_dt_byid_del.changed | bool"
    fail_msg: "Deleting the downtime by ID reported no change."
    success_msg: "The downtime was deleted by ID."

