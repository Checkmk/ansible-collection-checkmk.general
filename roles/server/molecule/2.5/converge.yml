---
- name: Converge
  hosts: all

  pre_tasks:

    - name: "Update apt cache."
      ansible.builtin.package:
        update_cache: true
        cache_valid_time: 600
      when: ansible_facts['os_family'] == 'Debian'
      tags:
        - molecule-idempotence-notest

    - name: "Install prerequisites."
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop:
        - apt-utils
        - man
      when: ansible_facts['os_family'] == 'Debian'

    - name: "Create '/usr/share/man/man8/' on Ubuntu."
      ansible.builtin.file:
        path: /usr/share/man/man8/
        state: directory
        mode: "0755"
        owner: root
        group: root
      when: ansible_facts['distribution'] == 'Ubuntu'

    # See https://github.com/geerlingguy/docker-rockylinux9-ansible/issues/6
    - name: "Fix permissions on /etc/shadow for Rocky 9 and 10."
      ansible.builtin.file:
        path: /etc/shadow
        mode: "0400"
      when: ansible_facts['distribution'] == 'Rocky' and (ansible_facts['distribution_major_version'] == '9' or ansible_facts['distribution_major_version'] == '10')

    # This seems Suse specific: https://support.scc.suse.com/s/kb/Ansible-fails-to-run-ansible-builtin-package-facts?language=en_US
    - name: "Install prerequisites."
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop:
        - python311-rpm  # Actual dependency, needed before first role run
      when: ansible_facts['os_family'] == 'Suse' and ansible_facts['distribution_major_version'] == '15'

    # This seems Suse specific: https://support.scc.suse.com/s/kb/Ansible-fails-to-run-ansible-builtin-package-facts?language=en_US
    - name: "Install prerequisites."
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop:
        - python313-rpm  # Actual dependency, needed before first role run
        - procps  # Seems to be a missing dependency in Checkmk
      when: ansible_facts['os_family'] == 'Suse' and ansible_facts['distribution_major_version'] == '16'

    # This is systemd specific. `systemd-tmpfiles --create` should create `/run/lock/`, which does not trigger on a container.
    # Currently only SLES 16 seems to be affected. Further reading: https://lwn.net/Articles/1041316/
    - name: "Ensure /run/lock/ exists, as Checkmk relies on it."
      ansible.builtin.file:
        path: /run/lock
        state: directory
        mode: "0755"
        owner: root
        group: root
      when: ansible_facts['os_family'] == 'Suse' and ansible_facts['distribution_major_version'] == '16'

    - name: "Download MKP."
      ansible.builtin.get_url:
        url: https://exchange.checkmk.com/packages/sslcertificates/2244/sslcertificates-9.5.1.mkp
        dest: /tmp/sslcertificates.mkp
        mode: "0644"
      delegate_to: localhost

  tasks:

    - name: "Run server role."
      ansible.builtin.include_role:
        name: server
