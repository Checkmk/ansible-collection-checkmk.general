###############################################################################
#                                                                             #
#  Changelog fragment template for the checkmk.general collection.            #
#                                                                             #
#  How to use:                                                                #
#    1. Copy this file to changelogs/fragments/<short-name>.yml               #
#       (e.g. discovery_260.yml, host_module_idempotency.yml).                #
#    2. Uncomment the section(s) you need and fill them in.                   #
#    3. Delete everything you do not use, including these instructions,       #
#       before committing for better readability.                             #
#                                                                             #
#  File format reference:                                                     #
#    https://github.com/ansible-community/antsibull-changelog/blob/main/docs/changelog.yaml-format.md
#                                                                             #
###############################################################################
#
# Entry style used in this collection:
#
#   - <Scope> - <Sentence starting with an uppercase letter and ending with a period.>
#
#   * Scope is human-readable, not the raw module identifier:
#       `Discovery module`, `Agent role`, `LDAP Connection lookup module`,
#       `All modules and roles`, `Inventory plugin`.
#   * Wrap parameters, code, values, and filenames in DOUBLE backticks:
#       ``api_user``, ``mega_menu_icons``.
#   * Multi-line entries are allowed; indent continuation lines by 4 spaces:
#       - Module name - First sentence.
#         Second sentence with rationale, migration notes, or links.
#   * Collection-wide entries may omit the scope and start the sentence
#     with an uppercase letter.
#   * New modules or plugins belong under `major_changes`.
#     New parameters or features on existing modules belong under
#     `minor_changes`.
#
# Available keys (ordered by how often this collection uses them):
#
#   release_summary      One short sentence describing the release.
#                        Only required once per release.
#   minor_changes        New parameters, new features on existing modules,
#                        role enhancements, dependency bumps.
#   bugfixes             Fixes that resolve issues.
#   major_changes        New modules or plugins, large reworks. Shown in
#                        both the changelog and the porting guide.
#   breaking_changes     Changes that force users to update playbooks or
#                        roles. Shown in both the changelog and the
#                        porting guide.
#   known_issues         Known limitations shipped with a release.
#                        Often paired with `major_changes` for experimental
#                        or partial support.
#   deprecated_features  Features scheduled for removal in a future release.
#   removed_features     Previously deprecated features that are now removed.
#                        Rarely used; removals are usually documented under
#                        `breaking_changes` instead.
#   security_fixes       Fixes that address CVEs or security concerns.
#                        Include a reference to the vulnerability if possible.
#
###############################################################################


# release_summary: "One short, friendly sentence describing this release."


# minor_changes:
#   - Discovery module - Add support for Checkmk 3.0.0.
#   - User module - Checkmk 2.5.0 renames the ``mega_menu_icons`` parameter
#     of the user management REST API endpoints.


# bugfixes:
#   - Site module - Fix the management of connections without configuration replication.
#   - Password module - Fix non-required module options being wrongly required.


# major_changes:
#   - Notification module - Add module to manage notification rules.
#   - All modules and roles - Supporting Checkmk 2.4.0 from this version onwards.


# breaking_changes:
#   - Rename authentication variables ``automation_user`` to ``api_user`` and
#     ``automation_secret`` to ``api_secret``.
#     Update your playbooks accordingly. The old names are retained as
#     aliases for one release and will be removed afterwards.


# known_issues:
#   - Server role - Suse support is currently tested only on openSUSE Leap 15.
#     If you have any interest in this functionality and have a SLES 15 handy,
#     we are happy to collaborate on this.


# deprecated_features:
#   - host_group module - Options ``host_group_name`` and ``host_groups`` are
#     renamed to ``name`` and ``groups``. The old names will be removed in a
#     future release.


# removed_features:
#   - host module - Deprecated option ``host_name`` was removed. Use ``name`` instead.


# security_fixes:
#   - Module name - Short description of the fix. (CVE-YYYY-NNNNN)
