concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: Lookup Module Rulesets

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'
  pull_request:
    branches:
      - main
      - devel
    types:
      - opened
    paths:
      - 'plugins/lookup/ruleset.py'
      - 'plugins/lookup/rulesets.py'
  push:
    paths:
      - '.github/workflows/ans-int-test-lkp-rulesets.yaml'
      - 'plugins/lookup/ruleset.py'
      - 'plugins/lookup/rulesets.py'
      - 'plugins/module_utils/**'
      - 'tests/integration/files/includes/**'
      - 'tests/integration/targets/lookup_rulesets/**'

jobs:

  integration:
    name: "Integration ${{ matrix.checkmk_version }}.${{ matrix.checkmk_edition }}"
    uses: ./.github/workflows/_template-ans-int-test.yaml
    with:
      module: lookup_rulesets
      checkmk_version: ${{ matrix.checkmk_version }}
      checkmk_edition: ${{ matrix.checkmk_edition }}
    strategy:
      fail-fast: false
      matrix:
        checkmk_version:
          - 2.3.0p42
          - 2.4.0p22
          - 2.5.0-2025.03.12
        checkmk_edition:
          - raw
          - managed
