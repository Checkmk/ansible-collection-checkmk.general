concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: Module Metric Backend Integration

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'
  pull_request:
    branches:
      - main
      - devel
    types:
      - opened
    paths:
      - 'plugins/modules/metricbackend.py'
  push:
    paths:
      - '.github/workflows/ans-int-test-metricbackend.yaml'
      - 'plugins/modules/metricbackend.py'
      - 'plugins/module_utils/**'
      - 'tests/integration/files/includes/**'
      - 'tests/integration/targets/metricbackend/**'

jobs:

  integration:
    name: "${{ matrix.checkmk_version }}.${{ matrix.checkmk_edition }}"
    uses: ./.github/workflows/_template-ans-int-test.yaml
    with:
      module: metricbackend
      checkmk_version: ${{ matrix.checkmk_version }}
      checkmk_edition: ${{ matrix.checkmk_edition }}
    strategy:
      fail-fast: false
      matrix:
        checkmk_version:
          - 3.0.0-2026.06.24
        checkmk_edition:
          - ultimatemt
