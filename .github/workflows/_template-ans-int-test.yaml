# Resources:
# - About reusable workflows: https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows
# - Template for this file: https://github.com/ansible-collections/collection_template/blob/main/.github/workflows/ansible-test.yml
# - About Ansible integration tests: https://docs.ansible.com/ansible/latest/dev_guide/testing_integration.html

name: Template for Ansible Integration Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
      checkmk:
        required: true
        type: string

jobs:

  integration:
    runs-on: ubuntu-24.04
    name: Ⓐ${{ matrix.ansible }}+py${{ matrix.python }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        ansible:
          # - stable-2.18
          # - stable-2.19
          - stable-2.20
          - devel
        python:
          # - '3.11'
          - '3.12'
          - '3.13'
        exclude:
          # Exclude unsupported sets.
          - ansible: devel
            python: '3.11'
          - ansible: stable-2.20
            python: '3.11'

# Ports Concept Old:
# 1                   2       3              4
# Usecase             Edition Remote Count   Checkmk Minor Version
# Apache: 5           Raw: 0  0 - 2          3, 4, 5
# Livestatus: 6       Managed: 1
# Livestatusproxy: 4
# RabbitMQ: 3

# Ports Concept Simplified:
# 1                   2       3              4
# Usecase             Edition Remote Count   Blank
# Apache: 5           Raw: 0  0 - 2          0
# Livestatus: 6       Managed: 1
# Livestatusproxy: 4
# RabbitMQ: 3

    services:
      cre:
        image: checkmk/check-mk-raw:${{ inputs.checkmk }}
        ports:
          - 5000:5000  # Site Apache
        env:
          CMK_SITE_ID: "cre"
          CMK_PASSWORD: "Sup3rSec4et!"
      cre-r1:
        image: checkmk/check-mk-raw:${{ inputs.checkmk }}
        ports:
          - 5010:5000  # Site Apache
          - 6010:6557  # Livestatus
          - 4010:6664  # Livestatus Proxy
          - 3010:5671  # Message Broker
        env:
          CMK_SITE_ID: "cre_r1"
          CMK_PASSWORD: "Sup3rSec4et!"
          CMK_LIVESTATUS_TCP: "on"
          CMK_RABBITMQ_PORT: 5671
      cme:
        image: checkmk/check-mk-managed:${{ inputs.checkmk }}
        ports:
          - 5100:5000  # Site Apache
        env:
          CMK_SITE_ID: "cme"
          CMK_PASSWORD: "Sup3rSec4et!"
      cme-r1:
        image: checkmk/check-mk-managed:${{ inputs.checkmk }}
        ports:
          - 5110:5000  # Site Apache
          - 6110:6557  # Livestatus
          - 4110:6664  # Livestatus Proxy
          - 3110:5671  # Message Broker
        env:
          CMK_SITE_ID: "cme_r1"
          CMK_PASSWORD: "Sup3rSec4et!"

    steps:

      - name: "Check out code."
        uses: actions/checkout@v6
        with:
          path: ansible_collections/checkmk/general

      - name: "Install uv and set the python version."
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          working-directory: ./ansible_collections/checkmk/general/

      - name: "Setup uv venv."
        run: uv venv
        working-directory: ./ansible_collections/checkmk/general

      - name: "Install ansible-base (${{ matrix.ansible }})."
        run: uv pip install https://github.com/ansible/ansible/archive/${{ matrix.ansible }}.tar.gz
        working-directory: ./ansible_collections/checkmk/general

      - name: "Inject variables into integration test."
        run: |
          cat > tests/integration/integration_config.yml <<EOF
          checkmk_var_version: "${{ inputs.checkmk }}"
          EOF
        working-directory: ./ansible_collections/checkmk/general

      - name: "Run integration test."
        run: uv run ansible-test integration ${{ inputs.module }} -v --color --continue-on-error --diff --python ${{ matrix.python }}
        working-directory: ./ansible_collections/checkmk/general
