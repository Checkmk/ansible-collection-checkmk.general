# Resources:
# - About reusable workflows: https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows
# - Template for this file: https://github.com/ansible-collections/collection_template/blob/main/.github/workflows/ansible-test.yml
# - About Ansible integration tests: https://docs.ansible.com/ansible/latest/dev_guide/testing_integration.html

name: Template for Ansible Integration Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
      checkmk_version:
        required: true
        type: string
      checkmk_edition:
        required: true
        type: string

jobs:

  integration:
    runs-on: ubuntu-24.04
    name: Ⓐ${{ matrix.ansible }}+py${{ matrix.python }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        ansible:
          - stable-2.18
          - stable-2.19
          - stable-2.20
          - devel
        python:
          - '3.12'
          - '3.13'

    services:
      testsite:
        image: checkmk/check-mk-${{ inputs.checkmk_edition }}:${{ inputs.checkmk_version }}
        ports:
          - 5000:5000  # Site Apache
        env:
          CMK_SITE_ID: "testsite"
          CMK_PASSWORD: "Sup3rSec4et!"
      testsite-r-1:
        image: checkmk/check-mk-${{ inputs.checkmk_edition }}:${{ inputs.checkmk_version }}
        ports:
          - 5001:5000  # Site Apache
          - 6557:6557  # Livestatus
          - 6664:6664  # Livestatus Proxy
          - 5671:5671  # Message Broker
        env:
          CMK_SITE_ID: "testsite_r_1"
          CMK_PASSWORD: "Sup3rSec4et!"
          CMK_LIVESTATUS_TCP: "on"
          CMK_RABBITMQ_PORT: 5671

    steps:

      - name: "Check out code."
        uses: actions/checkout@v6
        with:
          path: ansible_collections/checkmk/general

      - name: "Install uv and set the python version."
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          github-token: ${{ github.token }}
          working-directory: ./ansible_collections/checkmk/general/
          python-version: ${{ matrix.python }}

      - name: "Setup uv venv."
        run: uv venv
        working-directory: ./ansible_collections/checkmk/general

      - name: "Install ansible-base (${{ matrix.ansible }})."
        run: uv pip install https://github.com/ansible/ansible/archive/${{ matrix.ansible }}.tar.gz
        working-directory: ./ansible_collections/checkmk/general

      - name: "Inject variables into integration test."
        run: |
          cat > tests/integration/integration_config.yml <<EOF
          checkmk_var_version: "${{ inputs.checkmk_version }}"
          checkmk_var_edition: "${{ inputs.checkmk_edition }}"
          EOF
        working-directory: ./ansible_collections/checkmk/general

      - name: "Run integration test."
        run: uv run ansible-test integration ${{ inputs.module }} -v --color --continue-on-error --diff --python ${{ matrix.python }}
        working-directory: ./ansible_collections/checkmk/general
